spring:
  application:
    name: shipment-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/shipment_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8081

logging:
  level:
    com.paquetrack: DEBUG
    org.hibernate.SQL: DEBUG